<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>세계 국기·수도 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Pretendard,-apple-system,"Segoe UI",sans-serif;background:#0d1030;color:#eef;
 min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:960px}
.card{background:#161a45;border:1px solid #2b3170;border-radius:16px;padding:22px}
h1{font-size:26px;margin-bottom:6px}
h2{font-size:20px;margin-bottom:12px}
.sub{color:#9aa3d8;font-size:14px;margin-bottom:14px;line-height:1.5}
.btn{background:#3b82f6;color:#fff;border:0;border-radius:10px;padding:12px 20px;font-size:16px;
 font-weight:700;cursor:pointer}
.btn:hover{background:#2f6fd6}
.btn.ghost{background:#232a63;border:1px solid #3a4288}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.bar{height:10px;background:#232a63;border-radius:6px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:#3b82f6;width:0;transition:width .3s}
.meta{display:flex;justify-content:space-between;font-size:14px;color:#9aa3d8;margin-bottom:4px}
.quiz{display:flex;gap:22px;flex-wrap:wrap;align-items:center;margin-top:8px}
.flagbox{flex:0 0 300px;max-width:100%;background:#0d1030;border:1px solid #2b3170;border-radius:12px;
 padding:12px;display:flex;align-items:center;justify-content:center;min-height:180px}
.flagbox canvas,.flagbox img{max-width:100%;max-height:200px;border:1px solid #333;border-radius:6px}
.opts{flex:1;min-width:240px;display:flex;flex-direction:column;gap:10px}
.opt{background:#232a63;border:1px solid #3a4288;border-radius:10px;padding:14px 16px;font-size:17px;
 cursor:pointer;text-align:left;color:#eef}
.opt:hover{background:#2c3477}
.opt.correct{background:#166534;border-color:#22a355}
.opt.wrong{background:#7f1d1d;border-color:#dc2626}
.opt:disabled{cursor:default}
.q{font-size:18px;margin-bottom:6px;color:#cdd3ff}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}
th,td{border-bottom:1px solid #2b3170;padding:8px 6px;text-align:left}
th{color:#9aa3d8;font-weight:600}
td.o{font-weight:700}
.ok{color:#4ade80}.no{color:#f87171}
.center{text-align:center}
.big{font-size:40px;font-weight:800;margin:10px 0}
.fw{max-width:420px;width:100%;border-radius:12px;margin:10px auto;display:block}
.hidden{display:none}
.tag{display:inline-block;font-size:12px;padding:2px 8px;border-radius:6px;background:#232a63;color:#9aa3d8;margin-left:6px}
.pv{max-height:340px;overflow:auto;border:1px solid #2b3170;border-radius:12px;padding:10px;background:#0d1030;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.cell{text-align:center}
.cell canvas{width:100%;height:70px;object-fit:contain;background:#182;border:1px solid #333;border-radius:6px;background:#101433}
.cell div{font-size:12px;margin-top:3px;color:#cdd3ff}
input[type=range]{vertical-align:middle}
.warn{background:#3a2a12;border:1px solid #7a5a1a;color:#ffd98a;padding:10px 12px;border-radius:10px;font-size:13px;margin-top:10px}
</style></head>
<body><div class="wrap"><div class="card" id="app"></div></div>

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------------- FLAG SHEET AUTO-CROP ---------------- */
function loadImg(src){return new Promise(res=>{const im=new Image();im.crossOrigin="anonymous";im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;});}

function cropSheet(img, sheet, tol){
  // returns map idx->canvas
  const cv=document.createElement('canvas');cv.width=img.width;cv.height=img.height;
  const ctx=cv.getContext('2d');ctx.drawImage(img,0,0);
  const W=cv.width,H=cv.height,data=ctx.getImageData(0,0,W,H).data;
  const bg=[data[0],data[1],data[2]]; // top-left = background
  const isBg=(x,y)=>{const p=(y*W+x)*4;const dr=data[p]-bg[0],dg=data[p+1]-bg[1],db=data[p+2]-bg[2];
    return (dr*dr+dg*dg+db*db) < tol*tol;};
  // ----- column detection: vertical projection of non-bg -----
  const colCnt=new Array(W).fill(0);
  for(let x=0;x<W;x++){let c=0;for(let y=0;y<H;y+=2){if(!isBg(x,y))c++;}colCnt[x]=c;}
  const colThresh=H*0.02;
  let cols=runs(colCnt,colThresh, W*0.02);
  // keep the widest `sheet.cols` runs
  cols.sort((a,b)=>(b[1]-b[0])-(a[1]-a[0]));cols=cols.slice(0,sheet.cols);cols.sort((a,b)=>a[0]-b[0]);
  const out={}; let flat=0;
  for(let ci=0;ci<cols.length;ci++){
    const [cx0,cx1]=cols[ci];
    // ----- row detection within this column -----
    const rowCnt=new Array(H).fill(0);
    for(let y=0;y<H;y++){let c=0;for(let x=cx0;x<cx1;x+=2){if(!isBg(x,y))c++;}rowCnt[y]=c;}
    let rows=runs(rowCnt,(cx1-cx0)*0.03, H*0.008);
    // ----- for each row, flag = left content block -----
    let boxes=[];
    for(const [ry0,ry1] of rows){
      // find flag left edge
      let fl=cx0; while(fl<cx1){let any=false;for(let y=ry0;y<ry1;y++){if(!isBg(fl,y)){any=true;break;}}if(any)break;fl++;}
      // scan right until a horizontal background gap (space between flag and text)
      let fr=fl, gap=0; const gapNeed=Math.max(6,(cx1-cx0)*0.03);
      let x=fl;
      for(x=fl;x<cx1;x++){let any=false;for(let y=ry0;y<ry1;y++){if(!isBg(x,y)){any=true;break;}}
        if(any){gap=0;fr=x;}else{gap++;if(gap>gapNeed)break;}}
      // trim vertically to content within [fl,fr]
      let ty0=ry1,ty1=ry0;
      for(let y=ry0;y<ry1;y++){let any=false;for(let xx=fl;xx<=fr;xx++){if(!isBg(xx,y)){any=true;break;}}if(any){if(y<ty0)ty0=y;if(y>ty1)ty1=y;}}
      if(ty1<=ty0){ty0=ry0;ty1=ry1;}
      boxes.push({x:fl,y:ty0,w:Math.max(1,fr-fl),h:Math.max(1,ty1-ty0),ry0,ry1});
    }
    // ----- NORMALIZE: use column median width & height; fix outliers (first cell bug) -----
    const med=arr=>{const s=arr.slice().sort((a,b)=>a-b);return s[s.length>>1]||1;};
    const mw=med(boxes.map(b=>b.w)), mh=med(boxes.map(b=>b.h));
    for(const b of boxes){
      if(b.w < mw*0.6 || b.w > mw*1.6){b.w=mw;}
      if(b.h < mh*0.6 || b.h > mh*1.6){ // recenter height in its row band
        const cy=(b.ry0+b.ry1)/2; b.y=Math.round(cy-mh/2); b.h=mh;
      }
    }
    for(const b of boxes){
      const fc=document.createElement('canvas');fc.width=b.w;fc.height=b.h;
      fc.getContext('2d').drawImage(cv,b.x,b.y,b.w,b.h,0,0,b.w,b.h);
      out[flat++]=fc;
    }
  }
  return out;
}
function runs(arr,thresh,minGap){
  const res=[];let start=-1,gap=0;
  for(let i=0;i<arr.length;i++){
    if(arr[i]>thresh){ if(start<0)start=i; gap=0; }
    else { if(start>=0){gap++; if(gap>minGap){res.push([start,i-gap]);start=-1;gap=0;}} }
  }
  if(start>=0)res.push([start,arr.length-1]);
  return res.filter(r=>r[1]-r[0]>3);
}

async function detectAll(tol){
  flagCanvas={};
  for(let si=0;si<SHEETS.length;si++){
    const s=SHEETS[si];
    let img=await loadImg("flags/"+s.file);
    if(!img){continue;}
    let m;
    try{ m=cropSheet(img,s,tol); }catch(e){ m={}; }
    s.list.forEach((c,i)=>{ if(m[i]) flagCanvas[c[2]]=m[i]; });
  }
}

async function screenPreview(){

let currentTol=26;
function renderPreview(){
  const got=Object.keys(flagCanvas).length;
  app.innerHTML=`<h2>${got} / 100 국기를 잘라냈어요. 정렬을 확인하세요.</h2>
  <div class="row">
    <label>배경 감도 <input type="range" min="10" max="60" value="${currentTol}" id="tol"> <span id="tv">${currentTol}</span></label>
    <button class="btn ghost" id="re">다시 검출</button>
    <button class="btn" id="play">이 상태로 게임 시작</button>
  </div>
  <div class="pv"><div class="grid" id="grid"></div></div>
  ${got<100?'<div class="warn">일부 국기를 못 읽었습니다. 못 읽은 나라는 게임에서 이름표로 표시됩니다. flags 폴더/파일명(asia.png 등)을 확인하세요.</div>':''}`;
  const grid=document.getElementById('grid');
  COUNTRIES.forEach(c=>{
    const d=document.createElement('div');d.className='cell';
    if(flagCanvas[c.code]){const cc=flagCanvas[c.code];const cv=document.createElement('canvas');
      cv.width=cc.width;cv.height=cc.height;cv.getContext('2d').drawImage(cc,0,0);d.appendChild(cv);}
    else{const ph=document.createElement('canvas');ph.width=120;ph.height=70;const x=ph.getContext('2d');
      x.fillStyle='#232a63';x.fillRect(0,0,120,70);x.fillStyle='#889';x.font='12px sans-serif';x.textAlign='center';x.fillText(c.name,60,38);d.appendChild(ph);}
    const t=document.createElement('div');t.textContent=c.name;d.appendChild(t);grid.appendChild(d);
  });
  const tol=document.getElementById('tol'),tv=document.getElementById('tv');
  tol.oninput=()=>{tv.textContent=tol.value;currentTol=+tol.value;};
  document.getElementById('re').onclick=async()=>{app.querySelector('h2').textContent='다시 검출 중…';await detectAll(currentTol);renderPreview();};
  document.getElementById('play').onclick=startGame;
}

/* ---------------- GAME ---------------- */
let game;
function startGame(){
  const total=STAGES.reduce((a,s)=>a+s.n,0); // 22
  const pick=shuffle(COUNTRIES).slice(0,total); // no duplicates across whole game
  let k=0; const stages=STAGES.map(st=>{const qs=pick.slice(k,k+st.n).map(c=>makeQ(c));k+=st.n;return {def:st,qs};});
  game={stages,si:0,qi:0};
  renderStageIntro();
}
function makeQ(c){
  const type=Math.random()<0.5?'country':'capital';
  if(type==='country'){
    const wrong=shuffle(COUNTRIES.filter(x=>x.code!==c.code)).slice(0,3).map(x=>x.name);
    return {type,c,q:"이 국기는 어느 나라일까요?",ans:c.name,opts:shuffle([c.name,...wrong])};
  }else{
    const wrong=shuffle(COUNTRIES.filter(x=>x.cap!==c.cap)).slice(0,3).map(x=>x.cap);
    return {type,c,q:`${c.name}의 수도는 어디일까요?`,ans:c.cap,opts:shuffle([c.cap,...wrong])};
  }
}
function renderStageIntro(){
  const st=game.stages[game.si].def;
  app.innerHTML=`<h2>${st.label}</h2><p class="sub">${st.n}문제 중 <b>${st.pass}문제 이상</b> 맞히면 통과!</p>
  <button class="btn" id="s">시작</button>`;
  document.getElementById('s').onclick=()=>{game.qi=0;game.stages[game.si].qs.forEach(q=>{q.chosen=null;});renderQ();};
}
function flagInto(el,c){
  el.innerHTML='';
  if(flagCanvas[c.code]){const cc=flagCanvas[c.code];const cv=document.createElement('canvas');
    cv.width=cc.width;cv.height=cc.height;cv.getContext('2d').drawImage(cc,0,0);el.appendChild(cv);}
  else{const im=new Image();im.src="https://flagcdn.com/w320/"+c.code+".png";
    im.onerror=()=>{el.innerHTML='<div style="font-size:20px;font-weight:700">'+c.name+'</div>';};el.appendChild(im);}
}
function renderQ(){
  const stage=game.stages[game.si], q=stage.qs[game.qi], st=stage.def;
  const correctSoFar=stage.qs.filter(x=>x.chosen&&x.chosen===x.ans).length;
  app.innerHTML=`<div class="meta"><span>${st.label} · 문제 ${game.qi+1}/${st.n}</span><span>맞힌 개수 ${correctSoFar}</span></div>
  <div class="bar"><i style="width:${(game.qi)/st.n*100}%"></i></div>
  <div class="quiz"><div class="flagbox" id="fb"></div>
  <div class="opts"><div class="q">${q.q}${q.type==='capital'?'<span class="tag">수도</span>':'<span class="tag">나라</span>'}</div>
  <div id="opts"></div></div></div>`;
  if(q.type==='country') flagInto(document.getElementById('fb'),q.c);
  else document.getElementById('fb').innerHTML='<div style="font-size:26px;font-weight:800">'+q.c.name+'</div>';
  const box=document.getElementById('opts');
  q.opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>{ if(q.chosen)return; q.chosen=o;
      [...box.children].forEach(x=>{x.disabled=true;
        if(x.textContent===q.ans)x.classList.add('correct');
        else if(x.textContent===o)x.classList.add('wrong');});
      setTimeout(()=>{ game.qi++; if(game.qi<st.n)renderQ(); else renderStageResult(); },900);
    };box.appendChild(b);});
}
function renderStageResult(){
  const stage=game.stages[game.si], st=stage.def;
  const correct=stage.qs.filter(q=>q.chosen===q.ans).length;
  const passed=correct>=st.pass;
  let rows=stage.qs.map((q,i)=>{const ok=q.chosen===q.ans;
    return `<tr><td>${i+1}</td><td>${q.c.name}${q.type==='capital'?' <span class="tag">수도</span>':' <span class="tag">나라</span>'}</td>
    <td class="o ${ok?'ok':'no'}">${ok?'정답':'오답'}</td>
    <td>내 선택: ${q.chosen||'-'}</td><td>정답: <b>${q.ans}</b></td></tr>`;}).join('');
  app.innerHTML=`<h2>${st.label} 결과 <span class="tag">${correct} / ${st.n} 정답</span></h2>
  <p class="sub">${passed?'통과 기준('+st.pass+'개)을 넘었어요!':'통과 기준('+st.pass+'개)에 못 미쳤어요.'}</p>
  <table><thead><tr><th>#</th><th>문제</th><th>결과</th><th>내 선택</th><th>정답</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="row" style="margin-top:16px" id="nav"></div>`;
  const nav=document.getElementById('nav');
  if(passed){
    if(game.si<game.stages.length-1){const b=btn('다음 스테이지로');b.onclick=()=>{game.si++;renderStageIntro();};nav.appendChild(b);}
    else renderWin();
  }else{ renderFail(); }
}
function renderWin(){
  app.innerHTML=`<div class="center"><div class="big" style="color:#ffd54a">성공~!</div>
  <p class="sub">3스테이지를 모두 통과했어요. 축하합니다!</p>
  <img class="fw" src="${FIREWORKS}" alt="폭죽">
  <div class="row" style="justify-content:center"><button class="btn" id="ng">새로운 게임 하기</button></div></div>`;
  document.getElementById('ng').onclick=startGame;
}
function renderFail(){
  const nav=document.getElementById('nav');
  const msg=document.createElement('div');msg.style.width='100%';msg.innerHTML=`<div class="big" style="color:#f87171">처음부터 다시해볼까?</div>`;
  nav.parentNode.insertBefore(msg,nav);
  const b=btn('새로운 게임 하기');b.onclick=startGame;nav.appendChild(b);
}
function btn(t){const b=document.createElement('button');b.className='btn';b.textContent=t;return b;}

screenStart();
</script>
</body></html>
