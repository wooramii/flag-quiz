<meta name="description" content="국기 100개국 나라·수도 맞히기 퀴즈. 3스테이지, 랭킹, 걸린 시간 기록!">
<!-- Open Graph (링크 공유 미리보기) -->
<meta property="og:type" content="website">
<meta property="og:title" content="세계 국기·수도 퀴즈">
<meta property="og:description" content="국기 100개국 나라·수도 맞히기 · 3스테이지 · 랭킹 · 걸린 시간 기록">

<style>
  :root{
    --bg:#0f1a3a; --panel:#16224a; --panel2:#1d2c5c; --line:#2b3d78;
    --fg:#eef2ff; --mut:#9fb0e0; --pri:#3d6bff; --pri2:#5b86ff;
    --ok:#2ecc71; --no:#ff5a6a; --gold:#ffcf4a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--fg);min-height:100vh}
  .wrap{max-width:860px;margin:0 auto;padding:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px}
  h1{font-size:26px;margin:4px 0 2px}
  .sub{color:var(--mut);font-size:14px;margin-bottom:16px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700}
  .btn{background:var(--pri);color:#fff;padding:14px 20px;font-size:16px;width:100%}
  .btn:hover{background:var(--pri2)}
  .btn.sec{background:var(--panel2);border:1px solid var(--line)}
  input[type=text]{width:100%;padding:14px;border-radius:10px;border:1px solid var(--line);
       background:#0d1633;color:var(--fg);font-size:16px;margin-bottom:12px}
  /* progress */
  .top{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mut);margin-bottom:8px}
  .bar{height:8px;background:#0d1633;border-radius:6px;overflow:hidden;margin-bottom:16px}
  .bar>div{height:100%;background:var(--pri);width:0;transition:width .3s}
  /* flag */
  .flagbox{display:flex;justify-content:center;margin:6px 0 14px}
  .flagbox img{width:200px;height:132px;object-fit:cover;border-radius:10px;
       border:1px solid var(--line);background:#fff}
  .qtext{text-align:center;font-size:19px;font-weight:700;margin-bottom:16px}
  .qtext .hl{color:var(--gold)}
  /* options */
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .opt{background:var(--panel2);border:1px solid var(--line);color:var(--fg);
       padding:16px;font-size:16px;font-weight:600;transition:transform .08s}
  .opt:hover{border-color:var(--pri2)}
  .opt:active{transform:scale(.97)}
  .opt.correct{background:var(--ok);border-color:var(--ok);animation:pop .4s}
  .opt.wrong{background:var(--no);border-color:var(--no);animation:shake .4s}
  .opt.dim{opacity:.45}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}
       40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  .timer{position:absolute;right:20px;top:20px;font-size:13px;color:var(--mut)}
  /* result table */
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
  th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--mut);font-weight:600}
  td.o{color:var(--ok);font-weight:700}
  td.x{color:var(--no);font-weight:700}
  .rimg{width:38px;height:25px;object-fit:cover;border-radius:4px;vertical-align:middle;background:#fff}
  .center{text-align:center}
  .big{font-size:34px;font-weight:800;margin:10px 0}
  .big.win{color:var(--gold)}
  .big.lose{color:var(--no)}
  .fw{width:100%;max-width:360px;border-radius:12px;margin:10px auto;display:block}
  .stat{display:flex;justify-content:center;gap:24px;margin:14px 0;flex-wrap:wrap}
  .stat div b{display:block;font-size:24px}
  .stat div span{color:var(--mut);font-size:13px}
  /* ranking */
  .rank{width:100%;font-size:14px;border-collapse:collapse;margin-top:6px}
  .rank th,.rank td{padding:8px 6px;border-bottom:1px solid var(--line)}
  .rank td.n{text-align:right;font-variant-numeric:tabular-nums}
  .rank tr.me{background:#243766}
  .medal{font-weight:800}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .muted{color:var(--mut);font-size:13px;text-align:center;margin-top:12px}
  .flash{position:fixed;inset:0;pointer-events:none;opacity:0}
  .flash.ok{background:radial-gradient(circle,rgba(46,204,113,.35),transparent 60%);animation:fl .5s}
  .flash.no{background:radial-gradient(circle,rgba(255,90,106,.30),transparent 60%);animation:fl .5s}
  @keyframes fl{0%{opacity:.9}100%{opacity:0}}
</style>
</head>

const flagURL = c => "https://flagcdn.com/w320/"+c[2]+".png";
const STAGES = [
  {q:5, pass:3, name:"1스테이지"},
  {q:7, pass:5, name:"2스테이지"},
  {q:10,pass:8, name:"3스테이지"},
];
const TOTAL_Q = STAGES.reduce((a,s)=>a+s.q,0); // 22

let state = {};
const app = document.getElementById('app');
const flash = document.getElementById('flash');

/* ---------- 사운드 (Web Audio, 외부파일 불필요) ---------- */
let actx=null;
function beep(type){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const now = actx.currentTime;
    const seq = type==='ok' ? [[660,0],[880,.09],[1175,.18]]
             : type==='no' ? [[300,0],[200,.12]]
             : [[523,0],[659,.12],[784,.24],[1047,.36]]; // win
    seq.forEach(([f,t])=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type = type==='no'?'sawtooth':'triangle';
      o.frequency.value=f;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(0.0001, now+t);
      g.gain.exponentialRampToValueAtTime(0.25, now+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now+t+0.22);
      o.start(now+t); o.stop(now+t+0.24);
    });
  }catch(e){}
}

/* ---------- 유틸 ---------- */
const shuffle = a => {a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
function fmtTime(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+":"+String(s%60).padStart(2,'0');}

/* ---------- 랭킹 저장 ---------- */
const RK="flagquiz_ranking_v1";
function loadRank(){try{return JSON.parse(localStorage.getItem(RK))||[]}catch(e){return[]}}
function saveRank(list){localStorage.setItem(RK, JSON.stringify(list.slice(0,20)))}
function addRecord(rec){
  const list=loadRank(); list.push(rec);
  // 정렬: 정답 많은 순 → 시간 짧은 순
  list.sort((a,b)=> b.correct-a.correct || a.time-b.time);
  saveRank(list);
  return list.findIndex(r=>r===rec);
}

/* ---------- 게임 생성 ---------- */
function newGame(){
  const picks = shuffle(COUNTRIES).slice(0, TOTAL_Q);
  let idx=0, questions=[];
  STAGES.forEach((st,si)=>{
    for(let k=0;k<st.q;k++){
      const c = picks[idx++];
      const type = Math.random()<0.5 ? 'country' : 'capital';
      // 오답 보기 3개
      const pool = COUNTRIES.filter(x=>x!==c);
      const wrong = shuffle(pool).slice(0,3);
      let correct, options;
      if(type==='country'){ // 국기 → 나라
        correct=c[0];
        options=shuffle([c[0], ...wrong.map(w=>w[0])]);
      }else{ // 나라 → 수도
        correct=c[1];
        options=shuffle([c[1], ...wrong.map(w=>w[1])]);
      }
      questions.push({c,type,correct,options,stage:si,answer:null});
    }
  });
  state={name:state.name||'', qi:0, correct:0, questions, startAt:Date.now(),
         stageCorrect:0, stageStart:0};
  renderQuestion();
}

/* ---------- 시작(이름 입력) ---------- */
function renderStart(){
  const rank=loadRank();
  app.innerHTML=`
    <h1>세계 국기·수도 퀴즈</h1>
    <div class="sub">국기 100개국 · 나라/수도 맞히기 · 3스테이지</div>
    <input type="text" id="pname" maxlength="12" placeholder="플레이어 이름을 입력하세요"
           value="${state.name||''}">
    <button class="btn" id="startBtn">게임 시작</button>
    ${rank.length? `<h3 style="margin:22px 0 4px">최고 기록</h3>`+rankTable(rank,-1):''}
    <div class="muted">기록은 이 브라우저에 저장됩니다.</div>
  `;
  document.getElementById('startBtn').onclick=()=>{
    const v=document.getElementById('pname').value.trim();
    state.name = v || '익명';
    newGame();
  };
  document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('startBtn').click();});
}

function rankTable(list, meIdx){
  const medal=i=>['1위','2위','3위'][i]||(i+1)+'위';
  return `<table class="rank"><thead><tr><th>순위</th><th>이름</th>
    <th class="n">정답</th><th class="n">시간</th></tr></thead><tbody>`+
    list.slice(0,10).map((r,i)=>`<tr class="${i===meIdx?'me':''}">
      <td class="medal">${medal(i)}</td><td>${escapeHtml(r.name)}</td>
      <td class="n">${r.correct}/${r.total}</td><td class="n">${fmtTime(r.time)}</td></tr>`).join('')+
    `</tbody></table>`;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* ---------- 문제 화면 ---------- */
function renderQuestion(){
  const q=state.questions[state.qi];
  const st=STAGES[q.stage];
  // 스테이지 첫 문제면 스테이지 카운터 초기화 처리
  const globalNo=state.qi+1;
  const elapsed=Date.now()-state.startAt;
  const qhtml = q.type==='country'
    ? `<div class="flagbox"><img src="${flagURL(q.c)}" alt="국기"
         onerror="this.style.background='#334';this.alt='국기 로드 실패'"></div>
       <div class="qtext">이 국기는 <span class="hl">어느 나라</span>일까요?</div>`
    : `<div class="flagbox"><img src="${flagURL(q.c)}" alt="국기"
         onerror="this.style.background='#334'"></div>
       <div class="qtext"><span class="hl">${q.c[0]}</span>의 수도는 어디일까요?</div>`;
  app.innerHTML=`
    <div class="timer" id="timer">${fmtTime(elapsed)}</div>
    <div class="top"><span>${st.name} · 통과 ${st.pass}개</span>
       <span>문제 ${globalNo}/${TOTAL_Q} · 정답 ${state.correct}</span></div>
    <div class="bar"><div style="width:${globalNo/TOTAL_Q*100}%"></div></div>
    ${qhtml}
    <div class="opts" id="opts">
      ${q.options.map((o,i)=>`<button class="opt" data-i="${i}">${escapeHtml(o)}</button>`).join('')}
    </div>`;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>choose(b, q));
}

let timerIv=null;
function startTimer(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{const t=document.getElementById('timer');
    if(t)t.textContent=fmtTime(Date.now()-state.startAt); else clearInterval(timerIv);},1000);
}

function choose(btn, q){
  if(q.answer!==null) return;
  const picked=btn.textContent;
  q.answer=picked;
  const isOk=picked===q.correct;
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick=null;
    if(b.textContent===q.correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(isOk){state.correct++; beep('ok'); flashFx('ok');}
  else{beep('no'); flashFx('no');}
  setTimeout(nextStep, 950);
}
function flashFx(type){flash.className='flash '+type; setTimeout(()=>flash.className='flash',500);}

function nextStep(){
  const cur=state.questions[state.qi];
  const nx=state.questions[state.qi+1];
  const stageEnd = !nx || nx.stage!==cur.stage;
  if(stageEnd){ renderStageResult(cur.stage); }
  else { state.qi++; renderQuestion(); }
}

/* ---------- 스테이지 결과 ---------- */
function renderStageResult(si){
  const st=STAGES[si];
  const qs=state.questions.filter(q=>q.stage===si);
  const got=qs.filter(q=>q.answer===q.correct).length;
  const passed=got>=st.pass;
  const isLast=si===STAGES.length-1;
  const rows=qs.map(q=>{
    const ok=q.answer===q.correct;
    const typeTxt=q.type==='country'?'나라':'수도';
    return `<tr><td><img class="rimg" src="${flagURL(q.c)}" onerror="this.style.background='#334'"></td>
      <td>${typeTxt}</td><td>${escapeHtml(q.c[0])}</td>
      <td class="${ok?'o':'x'}">${ok?'○':'✕'} ${escapeHtml(q.answer||'-')}</td>
      <td>${escapeHtml(q.correct)}</td></tr>`;
  }).join('');
  const table=`<table><thead><tr><th>국기</th><th>유형</th><th>나라</th>
    <th>내 선택</th><th>정답</th></tr></thead><tbody>${rows}</tbody></table>`;

  if(!passed){ return renderGameOver(table, st, got); }
  if(isLast){ return renderWin(table); }

  app.innerHTML=`
    <div class="center"><div class="big win">${st.name} 통과!</div>
      <div class="sub">${qs.length}문제 중 <b style="color:var(--gold)">${got}</b>개 정답 (통과 ${st.pass}개)</div></div>
    ${table}
    <button class="btn" id="nextStage" style="margin-top:16px">다음 스테이지로 →</button>`;
  document.getElementById('nextStage').onclick=()=>{state.qi++; renderQuestion();};
}

/* ---------- 실패 ---------- */
function renderGameOver(table, st, got){
  clearInterval(timerIv);
  const time=Date.now()-state.startAt;
  const meIdx=addRecord({name:state.name,correct:state.correct,total:TOTAL_Q,time,date:Date.now()});
  app.innerHTML=`
    <div class="center">
      <div class="big lose">처음부터 다시해볼까?</div>
      <div class="sub">${st.name}에서 아쉽게 탈락 (${got}/${st.q}, 통과 ${st.pass}개 필요)</div>
      <div class="stat">
        <div><b>${state.correct}/${TOTAL_Q}</b><span>총 정답</span></div>
        <div><b>${fmtTime(time)}</b><span>걸린 시간</span></div>
      </div>
    </div>
    ${table}
    <h3 style="margin:20px 0 4px">최고 기록</h3>
    ${rankTable(loadRank(), meIdx)}
    <div class="row2">
      <button class="btn" id="retry">다시 도전</button>
      <button class="btn sec" id="home">처음 화면</button>
    </div>`;
  document.getElementById('retry').onclick=newGame;
  document.getElementById('home').onclick=renderStart;
}

/* ---------- 승리 ---------- */
function renderWin(table){
  clearInterval(timerIv);
  beep('win');
  const time=Date.now()-state.startAt;
  const meIdx=addRecord({name:state.name,correct:state.correct,total:TOTAL_Q,time,date:Date.now()});
  const best=loadRank()[0];
  const isBest = best && best.name===state.name && best.correct===state.correct && best.time===time && meIdx===0;
  app.innerHTML=`
    <div class="center">
      <div class="big win">성공~! 🎉</div>
      <div class="sub">${escapeHtml(state.name)}님, 모든 스테이지 클리어!${isBest?' <b style="color:var(--gold)">신기록!</b>':''}</div>
      <img class="fw" src="${FW}" alt="폭죽">
      <div class="stat">
        <div><b>${state.correct}/${TOTAL_Q}</b><span>총 정답</span></div>
        <div><b>${fmtTime(time)}</b><span>걸린 시간</span></div>
      </div>
    </div>
    ${table}
    <h3 style="margin:20px 0 4px">최고 기록</h3>
    ${rankTable(loadRank(), meIdx)}
    <div class="row2">
      <button class="btn" id="again">새로운 게임 하기</button>
      <button class="btn sec" id="home">처음 화면</button>
    </div>`;
  document.getElementById('again').onclick=newGame;
  document.getElementById('home').onclick=renderStart;
}

/* 타이머는 문제 렌더 후 항상 켜기 */
const _rq=renderQuestion;
renderQuestion=function(){_rq();startTimer();};

renderStart();
</script>
