<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국기 퀴즈 게임</title>
<style>
  :root{--bg:#0e1330;--card:#1b2350;--card2:#232c63;--ac:#4a7bff;--ac2:#3aa0ff;
        --ok:#28c76f;--no:#ff5b6a;--tx:#eef1ff;--mut:#9aa4d6;--bd:#31407e;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:Pretendard,-apple-system,"Segoe UI",sans-serif;
       background:radial-gradient(circle at 50% -10%,#1a2660,#0e1330 60%);color:var(--tx);
       min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:22px;}
  .wrap{width:100%;max-width:860px;}
  .panel{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:26px;}
  h1{font-size:26px;margin:0 0 6px;}
  .sub{color:var(--mut);font-size:15px;margin-bottom:20px;line-height:1.5;}
  .btn{background:var(--ac);color:#fff;border:none;border-radius:12px;padding:14px 22px;
       font-size:17px;font-weight:700;cursor:pointer;transition:.15s;}
  .btn:hover{background:var(--ac2);}
  .btn.big{width:100%;padding:16px;font-size:18px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
          font-size:14px;color:var(--mut);}
  .badge{background:var(--card2);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-weight:700;color:var(--tx);}
  .bar{height:8px;background:#101740;border-radius:6px;overflow:hidden;margin-bottom:20px;}
  .bar > i{display:block;height:100%;background:var(--ac);width:0;transition:.3s;}
  .q{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .flagbox{width:250px;height:166px;flex:0 0 auto;border-radius:12px;overflow:hidden;
           background:#fff;display:flex;align-items:center;justify-content:center;
           border:1px solid var(--bd);}
  .flagbox img{width:100%;height:100%;object-fit:contain;}
  .flagbox .nameonly{font-size:26px;font-weight:800;color:#222;text-align:center;padding:8px;}
  .qtext{font-size:20px;font-weight:700;margin:4px 0 14px;}
  .opts{flex:1 1 300px;display:flex;flex-direction:column;gap:12px;min-width:280px;}
  .opt{background:var(--card2);border:1px solid var(--bd);border-radius:12px;padding:15px 18px;
       font-size:18px;font-weight:600;cursor:pointer;text-align:left;transition:.12s;color:var(--tx);}
  .opt:hover{border-color:var(--ac);background:#2a3470;}
  .opt.correct{background:var(--ok);border-color:var(--ok);color:#fff;}
  .opt.wrong{background:var(--no);border-color:var(--no);color:#fff;}
  .opt:disabled{cursor:default;}
  .result-tbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px;}
  .result-tbl th,.result-tbl td{border-bottom:1px solid var(--bd);padding:9px 8px;text-align:left;}
  .result-tbl th{color:var(--mut);font-weight:600;}
  .rt-flag{width:46px;height:31px;object-fit:contain;background:#fff;border-radius:4px;vertical-align:middle;}
  .tag{font-weight:700;padding:2px 8px;border-radius:6px;font-size:13px;}
  .tag.o{background:rgba(40,199,111,.18);color:#4be08e;}
  .tag.x{background:rgba(255,91,106,.18);color:#ff8b96;}
  .center{text-align:center;}
  .big-msg{font-size:40px;font-weight:900;margin:10px 0;}
  .big-msg.win{color:#ffd23f;}
  .big-msg.lose{color:#ff8b96;}
  .fw{width:100%;max-width:460px;border-radius:14px;margin:10px auto;display:block;}
  .stat-line{font-size:17px;color:var(--mut);margin:10px 0 4px;}
  .pass{color:#4be08e;font-weight:800;}
  .fail{color:#ff8b96;font-weight:800;}
  .stg-pill{display:inline-block;background:var(--card2);border:1px solid var(--bd);
            border-radius:20px;padding:6px 16px;font-weight:700;margin-bottom:14px;}
  .note{font-size:13px;color:var(--mut);margin-top:14px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel" id="app"></div>
</div>

", "cap": "모가디슈", "code": "so"}, {"n": "르완다", "cap": "키갈리", "code": "rw"}, {"n": "에티오피아", "cap": "아디스아바바", "code": "et"}, {"n": "토고", "cap": "로메", "code": "tg"}, {"n": "수단", "cap": "카르툼", "code": "sd"}, {"n": "콩고민주공화국", "cap": "킨샤사", "code": "cd"}, {"n": "기니", "cap": "코나크리", "code": "gn"}, {"n": "말리", "cap": "바마코", "code": "ml"}];

// 스테이지 설정: [문제수, 통과기준]
const STAGES = [ {n:5, pass:3}, {n:7, pass:5}, {n:10, pass:8} ];
const TOTAL_Q = STAGES.reduce((a,s)=>a+s.n,0); // 22

const app = document.getElementById('app');
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,k){return shuffle(arr.slice()).slice(0,k);}
function flagURL(code){return "https://flagcdn.com/w320/"+code+".png";}

// 국기 이미지(실패 시 이름표로 대체)
function flagImg(c, cls){
  const box=document.createElement('div');
  const img=document.createElement('img');
  img.src=flagURL(c.code);
  img.alt=c.n;
  img.onerror=function(){ box.innerHTML='<div class="nameonly">'+c.n+'</div>'; };
  box.appendChild(img);
  return {box,img};
}

let game=null;
function newGame(){
  // 22개국 중복 없이 추출
  const picks = sample(COUNTRIES, TOTAL_Q);
  let idx=0;
  const stages = STAGES.map(s=>{
    const qs=[];
    for(let i=0;i<s.n;i++){
      const country=picks[idx++];
      // 유형: 0=국기->나라, 1=나라->수도  (반반 랜덤)
      const type = Math.random()<0.5 ? 0 : 1;
      qs.push(makeQuestion(country,type));
    }
    return {conf:s, qs, answers:[]};
  });
  game={stages, si:0, qi:0, correctInStage:0};
  renderStageIntro();
}

function makeQuestion(country,type){
  if(type===0){
    // 국기 -> 나라 이름
    const others=sample(COUNTRIES.filter(c=>c.n!==country.n),3).map(c=>c.n);
    const opts=shuffle([country.n,...others]);
    return {type,country,prompt:"이 국기는 어느 나라일까요?",answer:country.n,opts,showFlag:true};
  }else{
    // 나라 -> 수도 (국기도 함께 보여줌)
    const others=sample(COUNTRIES.filter(c=>c.cap!==country.cap),3).map(c=>c.cap);
    const opts=shuffle([country.cap,...others]);
    return {type,country,prompt:country.n+"의 수도는 어디일까요?",answer:country.cap,opts,showFlag:true};
  }
}

/* ---------- 시작 화면 ---------- */
function renderStart(){
  app.innerHTML=`
    <h1>세계 국기·수도 퀴즈</h1>
    <p class="sub">3개의 스테이지에 도전하세요. 국기를 보고 나라를 맞히거나, 나라의 수도를 맞히는 문제가 랜덤으로 나옵니다.<br>
    · 스테이지 1 : 5문제 (3개 이상 통과)<br>
    · 스테이지 2 : 7문제 (5개 이상 통과)<br>
    · 스테이지 3 : 10문제 (8개 이상이면 최종 승리)</p>
    <button class="btn big" id="startBtn">게임 시작하기</button>
    <p class="note">국기 이미지는 인터넷에서 불러옵니다(GitHub Pages 등 온라인 환경에서 표시됩니다).</p>`;
  document.getElementById('startBtn').onclick=newGame;
}

/* ---------- 스테이지 인트로 ---------- */
function renderStageIntro(){
  const s=game.stages[game.si];
  game.qi=0; game.correctInStage=0; s.answers=[];
  app.innerHTML=`
    <div class="center">
      <div class="stg-pill">스테이지 ${game.si+1} / 3</div>
      <h1>스테이지 ${game.si+1}</h1>
      <p class="sub">문제 ${s.conf.n}개 중 <b>${s.conf.pass}개 이상</b> 맞히면 ${game.si<2?'다음 스테이지로 진출':'최종 승리'}합니다.</p>
      <button class="btn big" id="go">시작</button>
    </div>`;
  document.getElementById('go').onclick=renderQuestion;
}

/* ---------- 문제 화면 ---------- */
function renderQuestion(){
  const s=game.stages[game.si];
  const q=s.qs[game.qi];
  const answered=TOTAL_Q; // for bar
  const doneBefore = game.stages.slice(0,game.si).reduce((a,x)=>a+x.conf.n,0);
  const progress = Math.round((doneBefore+game.qi)/TOTAL_Q*100);

  app.innerHTML=`
    <div class="topbar">
      <span class="badge">스테이지 ${game.si+1}/3</span>
      <span>문제 ${game.qi+1} / ${s.conf.n}</span>
      <span class="badge">정답 ${game.correctInStage}개</span>
    </div>
    <div class="bar"><i style="width:${progress}%"></i></div>
    <div class="q">
      <div class="flagbox" id="flagbox"></div>
      <div class="opts">
        <div class="qtext">${q.prompt}</div>
        <div id="optwrap" style="display:flex;flex-direction:column;gap:12px;"></div>
      </div>
    </div>`;

  const fb=document.getElementById('flagbox');
  const {box}=flagImg(q.country);
  // move children into flagbox
  fb.innerHTML='';
  Array.from(box.childNodes).forEach(n=>fb.appendChild(n));

  const wrap=document.getElementById('optwrap');
  q.opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=opt;
    b.onclick=()=>pick(b,opt,q,s);
    wrap.appendChild(b);
  });
}

function pick(btn,opt,q,s){
  const wrap=btn.parentNode;
  const btns=Array.from(wrap.children);
  btns.forEach(b=>b.disabled=true);
  const correct = opt===q.answer;
  if(correct){ btn.classList.add('correct'); game.correctInStage++; }
  else{
    btn.classList.add('wrong');
    btns.forEach(b=>{ if(b.textContent===q.answer) b.classList.add('correct'); });
  }
  s.answers.push({q, chosen:opt, correct});
  setTimeout(()=>{
    game.qi++;
    if(game.qi < s.conf.n) renderQuestion();
    else renderStageResult();
  }, correct?650:1150);
}

/* ---------- 스테이지 결과 ---------- */
function renderStageResult(){
  const s=game.stages[game.si];
  const got=game.correctInStage, need=s.conf.pass;
  const passed = got>=need;
  const rows=s.answers.map(a=>{
    const typeLabel = a.q.type===0?'국기→나라':'나라→수도';
    return `<tr>
      <td><img class="rt-flag" src="${flagURL(a.q.country.code)}" onerror="this.replaceWith(document.createTextNode('${a.q.country.n}'))"></td>
      <td>${a.q.country.n}</td>
      <td style="color:var(--mut)">${typeLabel}</td>
      <td><span class="tag ${a.correct?'o':'x'}">${a.correct?'정답':'오답'}</span></td>
      <td>${a.chosen}</td>
      <td>${a.q.answer}</td>
    </tr>`;
  }).join('');

  app.innerHTML=`
    <div class="stg-pill">스테이지 ${game.si+1} 결과</div>
    <h1>${got} / ${s.conf.n} 정답</h1>
    <p class="stat-line">통과 기준 ${need}개 &nbsp;·&nbsp; 결과:
      <span class="${passed?'pass':'fail'}">${passed?'통과':'미달'}</span></p>
    <table class="result-tbl">
      <thead><tr><th>국기</th><th>나라</th><th>유형</th><th>결과</th><th>내 선택</th><th>정답</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div id="after"></div>`;

  const after=document.getElementById('after');
  if(passed){
    if(game.si<2){
      const b=document.createElement('button');
      b.className='btn big'; b.textContent='다음 스테이지로';
      b.onclick=()=>{ game.si++; renderStageIntro(); };
      after.appendChild(b);
    }else{
      renderWin();
    }
  }else{
    renderLose();
  }
}

/* ---------- 최종 승리 ---------- */
function renderWin(){
  app.innerHTML=`
    <div class="center">
      <div class="big-msg win">성공~!</div>
      <img class="fw" src="${FW_GIF}" alt="폭죽">
      <p class="stat-line">3개의 스테이지를 모두 통과했습니다. 축하합니다!</p>
      <button class="btn big" id="again">새로운 게임 하기</button>
    </div>`;
  document.getElementById('again').onclick=newGame;
}

/* ---------- 실패 ---------- */
function renderLose(){
  const after=document.getElementById('after');
  const box=document.createElement('div');
  box.className='center';
  box.innerHTML=`
    <div class="big-msg lose">처음부터 다시해볼까?</div>
    <p class="stat-line">이번 스테이지 통과 기준에 미치지 못했어요.</p>`;
  const b=document.createElement('button');
  b.className='btn big'; b.textContent='새로운 게임 하기';
  b.onclick=newGame;
  box.appendChild(b);
  after.appendChild(box);
}

renderStart();
</script>
